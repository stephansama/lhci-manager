name: Release

on:
  push:
    branches:
      - main

permissions:
  actions: write
  contents: write
  deployments: write
  id-token: write
  issues: write
  pull-requests: write
  statuses: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'ci skip') && !contains(github.event.head_commit.message, 'skip ci')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Record existing tags
        run: git fetch --tags && git tag > /tmp/tags_before.txt

      - name: Create Release
        run: npx auto shipit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect new tag
        id: new-tag
        run: |
          git fetch --tags --force
          NEW=$(comm -13 <(sort /tmp/tags_before.txt) <(git tag | sort) | grep '^v' | head -1 || true)
          echo "tag=$NEW" >> $GITHUB_OUTPUT

      - name: Trigger Docker publish
        if: steps.new-tag.outputs.tag != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'docker-publish.yml',
              ref: '${{ steps.new-tag.outputs.tag }}'
            });
